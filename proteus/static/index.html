<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proteus AI - 控制台</title>
    <link rel="icon" type="image/svg+xml" href="/static/icon/proteus.png">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f4f5f7;
            color: #333;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 220px;
            min-width: 220px;
            background: #fff;
            border-right: 1px solid #e8eaed;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 18px 20px 16px;
            border-bottom: 1px solid #f0f0f0;
            flex-shrink: 0;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            flex-shrink: 0;
        }

        .logo-text { line-height: 1.2; }
        .logo-name { font-size: 14px; font-weight: 700; color: #222; letter-spacing: 0.3px; }
        .logo-sub { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }

        .nav-section { padding: 10px 0 4px; }

        .nav-section-title {
            font-size: 11px;
            font-weight: 600;
            color: #aab;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            padding: 4px 20px 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 20px;
            font-size: 14px;
            color: #555;
            cursor: pointer;
            border-radius: 0;
            transition: all 0.15s ease;
            text-decoration: none;
            position: relative;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .nav-item:hover { background: #f5f5f8; color: #333; }

        .nav-item.active {
            background: linear-gradient(90deg, rgba(79,70,229,0.08) 0%, rgba(79,70,229,0.03) 100%);
            color: #4f46e5;
            font-weight: 500;
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 4px;
            bottom: 4px;
            width: 3px;
            background: #4f46e5;
            border-radius: 0 2px 2px 0;
        }

        .nav-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }

        /* Sidebar spacer pushes user info to bottom */
        .sidebar-spacer { flex: 1; }

        /* ===== USER INFO ===== */
        .sidebar-user {
            padding: 14px 16px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .user-info { min-width: 0; flex: 1; }
        .user-name { font-size: 13px; font-weight: 600; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-role { font-size: 11px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .logout-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #aaa;
            font-size: 16px;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.15s ease;
            flex-shrink: 0;
            text-decoration: none;
        }
        .logout-btn:hover { color: #ef4444; background: rgba(239,68,68,0.08); }

        /* ===== MAIN ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        /* Top bar */
        .topbar {
            height: 52px;
            background: #fff;
            border-bottom: 1px solid #e8eaed;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            flex-shrink: 0;
        }

        .topbar-title {
            font-size: 20px;
            font-weight: 700;
            color: #222;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
        }

        .topbar-status {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #22c55e;
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .topbar-divider { width: 1px; height: 20px; background: #e8eaed; }

        .version-badge {
            font-size: 12px;
            color: #888;
            background: #f4f5f7;
            padding: 3px 10px;
            border-radius: 12px;
            border: 1px solid #e8eaed;
        }

        /* ===== PANELS ===== */
        .panel {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }

        .panel.active { display: flex; }

        /* Overview panel scrolls internally */
        .panel-overview {
            overflow-y: auto;
            padding: 28px;
        }

        /* Iframe panel — iframe fills entire panel */
        .panel-iframe {
            position: relative;
        }

        .content-frame {
            width: 100%;
            flex: 1;
            border: none;
            display: block;
            min-height: 0;
        }

        /* Page header */
        .page-header { margin-bottom: 24px; }
        .page-title { font-size: 26px; font-weight: 700; color: #222; margin-bottom: 6px; }
        .page-desc { font-size: 14px; color: #888; }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px 22px;
            border: 1px solid #e8eaed;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            transition: box-shadow 0.2s ease;
        }

        .stat-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }

        .stat-label { font-size: 13px; color: #888; margin-bottom: 8px; }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #222;
        }

        .stat-sub { font-size: 12px; color: #aaa; margin-top: 4px; }

        .stat-value.green { color: #16a34a; }
        .stat-value.blue { color: #2563eb; }
        .stat-value.orange { color: #d97706; }

        /* Quick access cards */
        .section-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .section-heading {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
            margin-bottom: 28px;
        }

        .feature-card {
            background: #fff;
            border-radius: 14px;
            padding: 24px;
            border: 1px solid #e8eaed;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-decoration: none;
            color: inherit;
            border: none;
            background: #fff;
            border: 1px solid #e8eaed;
            text-align: left;
            width: 100%;
        }

        .feature-card:hover {
            border-color: #4f46e5;
            box-shadow: 0 4px 20px rgba(79,70,229,0.12);
            transform: translateY(-2px);
        }

        .feature-card-top {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .feature-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .feature-icon.purple { background: rgba(79,70,229,0.1); }
        .feature-icon.orange { background: rgba(249,115,22,0.1); }
        .feature-icon.green { background: rgba(16,185,129,0.1); }
        .feature-icon.blue { background: rgba(59,130,246,0.1); }

        .feature-title { font-size: 16px; font-weight: 600; color: #222; }
        .feature-desc { font-size: 13px; color: #888; line-height: 1.6; }

        .feature-arrow {
            margin-top: auto;
            font-size: 13px;
            color: #4f46e5;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Recommendations */
        .rec-section { margin-bottom: 28px; }

        .rec-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 14px;
        }

        .rec-card {
            background: #fff;
            border-radius: 12px;
            padding: 18px;
            border: 1px solid #e8eaed;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .rec-card:hover { border-color: #4f46e5; box-shadow: 0 2px 12px rgba(79,70,229,0.1); }

        .rec-title {
            font-size: 14px;
            font-weight: 500;
            color: #222;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .rec-meta {
            font-size: 12px;
            color: #aaa;
            display: flex;
            justify-content: space-between;
        }

        /* Sub-menu list */
        .sub-list {
            display: none;
            flex-direction: column;
            padding: 0 0 4px 0;
        }
        .sub-list.open { display: flex; }

        .sub-list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 20px 4px;
        }

        .sub-new-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px 5px 16px;
            margin: 2px 10px;
            font-size: 13px;
            color: #4f46e5;
            cursor: pointer;
            border-radius: 6px;
            border: 1px dashed rgba(79,70,229,0.4);
            background: rgba(79,70,229,0.04);
            transition: all 0.15s ease;
            text-align: left;
            width: calc(100% - 20px);
        }
        .sub-new-btn:hover { background: rgba(79,70,229,0.1); border-color: #4f46e5; }

        .sub-item {
            display: flex;
            align-items: center;
            padding: 7px 20px 7px 40px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            transition: all 0.12s ease;
            border: none;
            background: none;
            text-align: left;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            position: relative;
        }
        .sub-item:hover { background: #f5f5f8; color: #333; }
        .sub-item.active {
            color: #4f46e5;
            background: rgba(79,70,229,0.06);
            font-weight: 500;
        }
        .sub-item-dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: #ccc; flex-shrink: 0; margin-right: 8px;
        }
        .sub-item.active .sub-item-dot { background: #4f46e5; }
        .sub-item-running .sub-item-dot {
            background: #22c55e;
            animation: pulse-green 2s infinite;
        }
        .sub-item-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .sub-loading {
            padding: 8px 20px 8px 40px;
            font-size: 12px;
            color: #bbb;
        }

        /* Nav item with expand arrow */
        .nav-item-expandable {
            justify-content: space-between;
        }
        .nav-item-expandable .nav-item-left {
            display: flex; align-items: center; gap: 10px;
        }
        .nav-expand-arrow {
            font-size: 10px;
            color: #bbb;
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }
        .nav-expand-arrow.open { transform: rotate(90deg); }

        /* Mobile */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .topbar { padding: 0 16px; }
            .panel-overview { padding: 16px; }
        }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">🔮</div>
            <div class="logo-text">
                <div class="logo-name">PROTEUS AI</div>
                <div class="logo-sub">智能体控制台</div>
            </div>
        </div>

        <div class="nav-section">
            <div class="nav-section-title">菜单</div>
            <button class="nav-item nav-item-expandable" id="navChat" data-expand="chat">
                <div class="nav-item-left"><span class="nav-icon">💬</span> 聊天</div>
                <span class="nav-expand-arrow" id="chatArrow">▶</span>
            </button>
            <!-- Chat sub-list -->
            <div class="sub-list" id="subListChat">
                <button class="sub-new-btn" id="newChatBtn">＋ 新建聊天</button>
                <div id="convItems"><div class="sub-loading">加载中...</div></div>
            </div>
        </div>

        <div class="nav-section">
            <div class="nav-section-title">控制</div>
            <button class="nav-item active" data-page="overview">
                <span class="nav-icon">📊</span> 概览
            </button>
            <button class="nav-item" data-page="monitor" data-url="/monitor">
                <span class="nav-icon">🤖</span> Agent 监控
            </button>
            <button class="nav-item nav-item-expandable" id="navKnowledge" data-expand="knowledge">
                <div class="nav-item-left"><span class="nav-icon">📚</span> 知识库</div>
                <span class="nav-expand-arrow" id="knowledgeArrow">▶</span>
            </button>
            <!-- Knowledge sub-list -->
            <div class="sub-list" id="subListKnowledge">
                <button class="sub-new-btn" id="newKbBtn" data-page="knowledge" data-url="/knowledge/index">📋 进入知识库</button>
                <div id="kbItems"><div class="sub-loading">加载中...</div></div>
            </div>
        </div>

        <div class="nav-section">
            <div class="nav-section-title">管理</div>
            <button class="nav-item" data-page="token" data-url="/static/token_management.html">
                <span class="nav-icon">🔐</span> Token 管理
            </button>
        </div>

        <div class="sidebar-spacer"></div>

        <!-- Current user info -->
        <div class="sidebar-user">
            <div class="user-avatar" id="userAvatar">U</div>
            <div class="user-info">
                <div class="user-name" id="userDisplayName">{{ nick_name or user_name or '用户' }}</div>
                <div class="user-role" id="userUsername">@{{ user_name or '' }}</div>
            </div>
            <button class="logout-btn" title="退出登录" onclick="handleLogout()">⏻</button>
        </div>
    </aside>

    <!-- Main -->
    <div class="main">
        <!-- Topbar -->
        <div class="topbar">
            <span class="topbar-title" id="topbarTitle">概览</span>
            <div class="topbar-right">
                <div class="topbar-status">
                    <div class="status-dot"></div>
                    <span style="color:#16a34a;font-weight:500;">健康状态 正常</span>
                </div>
                <div class="topbar-divider"></div>
                <span class="version-badge">Proteus AI</span>
            </div>
        </div>

        <!-- Overview Panel -->
        <div class="panel panel-overview active" id="panel-overview">
            <div class="page-header">
                <div class="page-title">概览</div>
                <div class="page-desc">系统状态、入口点和快速操作。</div>
            </div>

            <!-- Stats -->
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-label">运行中 Agent</div>
                    <div class="stat-value green" id="runningAgents">-</div>
                    <div class="stat-sub">实时数据</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">今日 Agent 总数</div>
                    <div class="stat-value" id="totalAgents">-</div>
                    <div class="stat-sub">已记录</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">活跃会话</div>
                    <div class="stat-value blue" id="activeConvs">-</div>
                    <div class="stat-sub">含运行中 Agent</div>
                </div>
            </div>

            <!-- Quick access -->
            <div class="section-title-row">
                <span class="section-heading">✨ 快捷入口</span>
            </div>
            <div class="cards-grid">
                <button class="feature-card" data-page="chat" data-url="/chat/index">
                    <div class="feature-card-top">
                        <div class="feature-icon purple">💬</div>
                        <div>
                            <div class="feature-title">智能对话</div>
                        </div>
                    </div>
                    <div class="feature-desc">与 AI 助手自然对话，支持工具调用、多种工作模式和文件分析。</div>
                    <div class="feature-arrow">进入对话 →</div>
                </button>

                <button class="feature-card" data-page="knowledge" data-url="/knowledge/index">
                    <div class="feature-card-top">
                        <div class="feature-icon orange">📚</div>
                        <div>
                            <div class="feature-title">知识库</div>
                        </div>
                    </div>
                    <div class="feature-desc">浏览和管理知识库内容，查找技术文档、操作指南、最佳实践等资源。</div>
                    <div class="feature-arrow">进入知识库 →</div>
                </button>

                <button class="feature-card" data-page="token" data-url="/static/token_management.html">
                    <div class="feature-card-top">
                        <div class="feature-icon green">🔐</div>
                        <div>
                            <div class="feature-title">Token 管理</div>
                        </div>
                    </div>
                    <div class="feature-desc">管理 Bearer Token，用于 API 认证和程序化访问，支持生成和撤销。</div>
                    <div class="feature-arrow">管理 Token →</div>
                </button>

                <button class="feature-card" data-page="monitor" data-url="/monitor">
                    <div class="feature-card-top">
                        <div class="feature-icon blue">🤖</div>
                        <div>
                            <div class="feature-title">Agent 监控</div>
                        </div>
                    </div>
                    <div class="feature-desc">实时监控 Agent 状态，按会话分组展示运行时间、Token 消耗和迭代进度。</div>
                    <div class="feature-arrow">查看监控 →</div>
                </button>
            </div>

            <!-- Recommendations -->
            <div class="rec-section" id="rec-section" style="display:none;">
                <div class="section-title-row">
                    <span class="section-heading">📖 知识库推荐</span>
                </div>
                <div class="rec-grid" id="rec-grid"></div>
            </div>
        </div>

        <!-- Iframe Panel (for embedded pages) -->
        <div class="panel panel-iframe" id="panel-iframe">
            <iframe class="content-frame" id="contentFrame" src="" title="内容面板"></iframe>
        </div>
    </div>

    <script>
        // ===== Logout =====
        async function handleLogout() {
            try {
                await fetch('/logout', { credentials: 'include' });
            } catch (e) {
                // ignore network errors
            }
            window.location.href = '/login';
        }

        // ===== Page navigation config =====
        const PAGE_CONFIG = {
            overview:  { title: '概览',        panel: 'overview' },
            chat:      { title: '聊天',        panel: 'iframe' },
            monitor:   { title: 'Agent 监控',  panel: 'iframe' },
            knowledge: { title: '知识库',      panel: 'iframe' },
            token:     { title: 'Token 管理',  panel: 'iframe' },
        };

        let currentPage = 'overview';
        let currentSubItem = null;

        function navigate(page, url, subItemId) {
            const cfg = PAGE_CONFIG[page];
            if (!cfg) return;

            // Update active nav item (only top-level nav-item buttons with data-page)
            document.querySelectorAll('.nav-item[data-page]').forEach(el => {
                el.classList.toggle('active', el.dataset.page === page);
            });

            // Update sub-item highlight
            document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('active'));
            if (subItemId) {
                const activeSubItem = document.querySelector(`.sub-item[data-id="${CSS.escape(subItemId)}"]`);
                if (activeSubItem) activeSubItem.classList.add('active');
                currentSubItem = subItemId;
            } else {
                currentSubItem = null;
            }

            // Update topbar title
            document.getElementById('topbarTitle').textContent = cfg.title;

            // Switch panel
            document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
            const targetPanel = document.getElementById('panel-' + cfg.panel);
            if (targetPanel) targetPanel.classList.add('active');

            // Load URL in iframe if needed
            if (cfg.panel === 'iframe' && url) {
                const frame = document.getElementById('contentFrame');
                if (frame.dataset.loadedUrl !== url) {
                    frame.src = url;
                    frame.dataset.loadedUrl = url;
                }
            }

            // Reload stats when returning to overview
            if (page === 'overview') {
                loadStats();
                loadRecommendations();
            }

            currentPage = page;
            history.pushState({ page, url, subItemId }, cfg.title, '#' + page);
        }

        // ===== Expandable sub-menus =====
        let chatExpanded = false;
        let knowledgeExpanded = false;

        function toggleChatMenu() {
            chatExpanded = !chatExpanded;
            document.getElementById('subListChat').classList.toggle('open', chatExpanded);
            document.getElementById('chatArrow').classList.toggle('open', chatExpanded);
            if (chatExpanded) loadConversations();
        }

        function toggleKnowledgeMenu() {
            knowledgeExpanded = !knowledgeExpanded;
            document.getElementById('subListKnowledge').classList.toggle('open', knowledgeExpanded);
            document.getElementById('knowledgeArrow').classList.toggle('open', knowledgeExpanded);
            if (knowledgeExpanded) loadKnowledgeItems();
        }

        async function loadConversations() {
            const container = document.getElementById('convItems');
            container.innerHTML = '<div class="sub-loading">加载中...</div>';
            try {
                const res = await fetch('/conversations');
                const data = await res.json();
                if (data.success && Array.isArray(data.conversations) && data.conversations.length > 0) {
                    container.innerHTML = '';
                    for (const conv of data.conversations) {
                        const convId = conv.conversation_id || conv.id || '';
                        const title = conv.title || '未命名会话';
                        const isRunning = conv.is_running;
                        const btn = document.createElement('button');
                        btn.className = 'sub-item' + (isRunning ? ' sub-item-running' : '');
                        btn.dataset.id = convId;
                        btn.title = title;
                        const dot = document.createElement('span');
                        dot.className = 'sub-item-dot';
                        const text = document.createElement('span');
                        text.className = 'sub-item-text';
                        text.textContent = title;
                        btn.appendChild(dot);
                        btn.appendChild(text);
                        btn.addEventListener('click', () => {
                            navigate('chat', '/chat/index?conversation_id=' + encodeURIComponent(convId), convId);
                        });
                        container.appendChild(btn);
                    }
                } else {
                    container.innerHTML = '<div class="sub-loading">暂无会话</div>';
                }
            } catch (e) {
                container.innerHTML = '<div class="sub-loading">加载失败</div>';
            }
        }

        async function loadKnowledgeItems() {
            const container = document.getElementById('kbItems');
            container.innerHTML = '<div class="sub-loading">加载中...</div>';
            try {
                const res = await fetch('/knowledge_base/list');
                const data = await res.json();
                const items = data.success ? (data.knowledge_base_items || []) : [];
                if (items.length > 0) {
                    container.innerHTML = '';
                    for (const item of items) {
                        const itemId = item.id || '';
                        const title = item.title || '无标题';
                        const btn = document.createElement('button');
                        btn.className = 'sub-item';
                        btn.dataset.id = itemId;
                        btn.title = title;
                        const dot = document.createElement('span');
                        dot.className = 'sub-item-dot';
                        const text = document.createElement('span');
                        text.className = 'sub-item-text';
                        text.textContent = title;
                        btn.appendChild(dot);
                        btn.appendChild(text);
                        btn.addEventListener('click', () => {
                            navigate('knowledge', '/knowledge/index?id=' + encodeURIComponent(itemId), itemId);
                        });
                        container.appendChild(btn);
                    }
                } else {
                    container.innerHTML = '<div class="sub-loading">暂无内容</div>';
                }
            } catch (e) {
                container.innerHTML = '<div class="sub-loading">加载失败</div>';
            }
        }

        // ===== Event delegation for nav items and feature cards =====
        document.addEventListener('click', function(e) {
            // Expand toggle buttons
            if (e.target.closest('#navChat')) { toggleChatMenu(); return; }
            if (e.target.closest('#navKnowledge')) { toggleKnowledgeMenu(); return; }

            // New chat button
            if (e.target.closest('#newChatBtn')) {
                // Open chat sub-menu if not open
                if (!chatExpanded) toggleChatMenu();
                navigate('chat', '/chat/index');
                return;
            }

            // Standard data-page buttons (but not expand buttons)
            const btn = e.target.closest('[data-page]');
            if (!btn || btn.dataset.expand) return;
            e.preventDefault();
            navigate(btn.dataset.page, btn.dataset.url || null);
        });

        // Handle browser back/forward
        window.addEventListener('popstate', function(e) {
            if (e.state && e.state.page) {
                if (currentPage !== e.state.page || currentSubItem !== (e.state.subItemId || null)) {
                    navigate(e.state.page, e.state.url, e.state.subItemId);
                }
            } else {
                navigate('overview', null);
            }
        });

        // ===== User avatar initial =====
        (function initUserAvatar() {
            const nameEl = document.getElementById('userDisplayName');
            const avatarEl = document.getElementById('userAvatar');
            if (nameEl && avatarEl) {
                const name = nameEl.textContent.trim();
                avatarEl.textContent = name ? name.charAt(0).toUpperCase() : 'U';
            }
        })();

        // ===== Stats and recommendations =====
        async function loadStats() {
            try {
                const res = await fetch('/agents/by_conversation');
                const data = await res.json();
                if (data.success && Array.isArray(data.data)) {
                    const groups = data.data;
                    let totalAgents = 0, runningAgents = 0, activeConvs = 0;
                    for (const g of groups) {
                        totalAgents += g.agents.length;
                        if (g.has_running) {
                            runningAgents += g.agents.filter(a => a.status === 'running').length;
                            activeConvs++;
                        }
                    }
                    document.getElementById('runningAgents').textContent = runningAgents;
                    document.getElementById('totalAgents').textContent = totalAgents;
                    document.getElementById('activeConvs').textContent = activeConvs;
                }
            } catch (e) {
                console.error('加载 Agent 统计失败:', e);
            }
        }

        async function loadRecommendations() {
            try {
                const response = await fetch('/knowledge_base/list');
                const data = await response.json();
                if (data.success && data.knowledge_base_items && data.knowledge_base_items.length > 0) {
                    const items = data.knowledge_base_items;
                    const selected = items.length <= 4 ? items : getRandomItems(items, 4);
                    const grid = document.getElementById('rec-grid');
                    grid.innerHTML = selected.map(item => `
                        <div class="rec-card" data-page="knowledge" data-url="/knowledge/index?id=${encodeURIComponent(item.id)}">
                            <div class="rec-title">${escapeHtml(item.title || '无标题')}</div>
                            <div class="rec-meta">
                                <span>👤 ${escapeHtml(item.author || '匿名')}</span>
                                <span>${formatDate(item.updated_at || item.timestamp)}</span>
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('rec-section').style.display = 'block';
                }
            } catch (e) {
                console.error('加载推荐内容失败:', e);
            }
        }

        function getRandomItems(arr, n) {
            const shuffled = arr.slice().sort(() => Math.random() - 0.5);
            return shuffled.slice(0, n);
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function formatDate(ts) {
            if (!ts) return '';
            const d = new Date(ts);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        // ===== Initialise =====
        document.addEventListener('DOMContentLoaded', () => {
            const rawHash = location.hash.replace('#', '');
            const safeHash = Object.prototype.hasOwnProperty.call(PAGE_CONFIG, rawHash) ? rawHash : '';
            if (safeHash && safeHash !== 'overview') {
                if (safeHash === 'chat') {
                    toggleChatMenu();
                    navigate('chat', '/chat/index');
                } else if (safeHash === 'knowledge') {
                    toggleKnowledgeMenu();
                    navigate('knowledge', '/knowledge/index');
                } else {
                    const navEl = document.querySelector(`.nav-item[data-page="${safeHash}"]`);
                    navigate(safeHash, navEl ? navEl.dataset.url : null);
                }
            } else {
                loadStats();
                loadRecommendations();
                history.replaceState({ page: 'overview', url: null }, '概览', '#overview');
            }
        });
    </script>
</body>
</html>
