# Knowledge Base Configuration Template
# Copy and modify this file for your knowledge base

# Basic information
name: "MyKnowledgeBase"
description: "A knowledge base for organizing documents"
created_at: "2024-01-01T00:00:00Z"
root_path: "/app/data/knowledge_bases/MyKnowledgeBase"

# Document processing settings
document_processing:
  # Supported formats
  supported_formats:
    - "pdf"
    - "docx"
    - "txt"
    - "md"
    - "html"
  
  # Maximum file size (in bytes)
  max_file_size: 10485760  # 10MB
  
  # Text extraction settings
  text_extraction:
    pdf:
      library: "pdfplumber"  # or "PyPDF2", "PDFMiner"
      enable_ocr: false
      ocr_language: "eng"
    docx:
      extract_images: false
      preserve_formatting: true
    encoding: "utf-8"
  
  # Section splitting
  section_splitting:
    method: "heading_based"  # or "fixed_length", "paragraph_based"
    min_section_length: 500  # characters
    max_sections: 50
    heading_levels:
      h1: true
      h2: true
      h3: true
      h4: false
  
  # Summarization
  summarization:
    enabled: true
    method: "extractive"  # or "abstractive"
    max_length: 300  # characters
    min_length: 50

# Hierarchy and categorization
hierarchy:
  # Automatic categorization
  auto_categorize: true
  categorization_method: "keyword_based"  # or "ml_based", "rule_based"
  
  # Directory structure
  max_depth: 5
  naming_convention: "snake_case"  # or "kebab-case", "camelCase"
  
  # Default categories
  default_categories:
    - "Uncategorized"
    - "General"
    - "Archive"
  
  # Category rules (for keyword-based categorization)
  category_rules:
    research:
      keywords: ["paper", "study", "research", "thesis"]
      weight: 1.0
    reports:
      keywords: ["report", "analysis", "review", "assessment"]
      weight: 1.0
    documentation:
      keywords: ["manual", "guide", "tutorial", "documentation"]
      weight: 0.8
    meetings:
      keywords: ["minutes", "agenda", "meeting", "notes"]
      weight: 0.6

# Search configuration
search:
  # Search algorithm
  algorithm: "hybrid"  # "vector", "keyword", "hybrid"
  
  # Vector search settings
  vector_search:
    model: "all-MiniLM-L6-v2"
    dimension: 384
    index_type: "FlatL2"  # or "IVFFlat", "HNSW"
    normalize: true
  
  # Keyword search settings
  keyword_search:
    analyzer: "standard"  # or "simple", "whitespace"
    stop_words: true
    stemming: true
  
  # Hybrid search weights
  hybrid_weights:
    vector: 0.7
    keyword: 0.3
  
  # Hierarchical disclosure
  hierarchical_disclosure:
    enabled: true
    default_levels: 3
    level_weights: [1.0, 0.8, 0.6, 0.4, 0.2]
  
  # Faceted search
  faceted_fields:
    - "category"
    - "author"
    - "year"
    - "document_type"
  
  # Performance settings
  performance:
    max_results: 100
    timeout_ms: 5000
    cache_enabled: true
    cache_ttl: 300  # seconds

# Indexing settings
indexing:
  # Index types to build
  index_types:
    - "vector"
    - "keyword"
    - "hierarchy"
  
  # Index update strategy
  update_strategy: "incremental"  # or "rebuild"
  rebuild_threshold: 1000  # documents
  
  # Vector index settings
  vector_index:
    shard_size: 10000
    quantization: "SQ8"  # or "None"
  
  # Storage settings
  storage:
    compress_indexes: true
    backup_before_rebuild: true

# Metadata management
metadata:
  # Required metadata fields
  required_fields:
    - "title"
    - "author"
    - "created_date"
  
  # Optional metadata fields
  optional_fields:
    - "keywords"
    - "abstract"
    - "doi"
    - "publisher"
    - "language"
  
  # Automatic metadata extraction
  auto_extract: true
  extraction_sources:
    - "filename"
    - "content"
    - "embedded_metadata"
  
  # Metadata validation
  validation:
    date_format: "iso"  # or "custom"
    custom_date_format: "%Y-%m-%d"
    enforce_required: true

# Storage settings
storage:
  # Directory structure
  directory_structure:
    documents: "documents/{category}/{doc_id}/"
    indexes: "indexes/"
    metadata: "metadata/"
    temp: "temp/"
  
  # File naming
  file_naming:
    document: "{original_name}"
    processed_text: "content.txt"
    summary: "summary.txt"
    metadata: "metadata.json"
  
  # Retention policies
  retention:
    keep_original: true
    max_versions: 3
    cleanup_temp_files: true
    temp_file_ttl: 86400  # 24 hours in seconds

# Performance optimization
performance:
  # Processing
  batch_size: 10
  max_workers: 4
  memory_limit_mb: 1024
  
  # Search
  query_cache_size: 1000
  result_cache_size: 100
  
  # Database
  database:
    connection_pool_size: 5
    journal_mode: "WAL"
    synchronous: "NORMAL"

# Security settings
security:
  # Access control
  require_authentication: false
  allowed_users: []
  
  # File permissions
  file_permissions:
    directories: 0o755
    files: 0o644
  
  # Input validation
  validate_file_paths: true
  prevent_traversal: true
  
  # Encryption
  encrypt_metadata: false
  encryption_key: ""

# Monitoring and logging
monitoring:
  # Logging
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  log_file: "kb.log"
  log_format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  # Metrics
  collect_metrics: true
  metrics_interval: 60  # seconds
  
  # Health checks
  health_check_enabled: true
  health_check_interval: 300  # seconds

# Backup and recovery
backup:
  enabled: true
  schedule: "daily"  # daily, weekly, monthly
  retention_days: 30
  backup_location: "/backups/{kb_name}"
  include_data: true
  include_indexes: true
  include_config: true

# Custom extensions
extensions:
  # Custom processors
  processors: []
  
  # Custom indexers
  indexers: []
  
  # Custom search algorithms
  search_algorithms: []
  
  # Custom exporters
  exporters: []

# Environment-specific overrides
# These can be overridden by environment variables
env_overrides:
  root_path: "KB_ROOT_PATH"
  max_file_size: "KB_MAX_FILE_SIZE"
  log_level: "KB_LOG_LEVEL"
