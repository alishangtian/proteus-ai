# 节点配置文件
# 定义所有可用的节点类型及其参数
# 每个节点类型包含type、name、description、output、params等字段
PythonExecuteNode:
  type: "python_execute"
  class: "src.nodes.python_execute.PythonExecuteNode"
  name: "Python/Shell代码执行"
  description: >-
    Python/Shell代码执行组件，支持 Python3 代码和 Shell 脚本执行。执行结果必须通过 print 输出才能被接收。
    文件目录说明：通用数据目录为 /app/data（该目录下的文件可通过 HTTP 访问，地址为 http://host:port/app/data/{file_name}），技能目录为 /app/.proteus/skills（技能根目录）。
    【文件读取】使用 Python 读取文件：读取文本文件：with open('/app/data/file.txt', 'r', encoding='utf-8') as f: content = f.read()；读取逐行列表：with open(path) as f: lines = f.readlines()；读取 JSON 文件：with open(path, 'r', encoding='utf-8') as f: import json; data = json.load(f)；读取 CSV 文件：with open(path, 'r', encoding='utf-8') as f: import csv; reader = csv.DictReader(f); rows = list(reader) 或 import pandas as pd; df = pd.read_csv('/app/data/file.csv')。
    【文件写入】覆盖写入：with open('/app/data/file.txt', 'w', encoding='utf-8') as f: f.write(content)；追加写入：open(path, 'a', encoding='utf-8')；写入 JSON：json.dump(data, f, ensure_ascii=False, indent=2)；写入 CSV：writer = csv.writer(f); writer.writerows(rows)；写入二进制文件：open(path, 'wb')。
    【文件编辑】先读取后修改再写回：with open(path, 'r', encoding='utf-8') as f: content = f.read()；字符串替换：content = content.replace(old_str, new_str)；正则替换：import re; content = re.sub(pattern, replacement, content)；然后 with open(path, 'w', encoding='utf-8') as f: f.write(content)。修改 JSON 文件：读取后更新 dict 再写回；修改 CSV 文件：用 pandas 读取、修改后 df.to_csv(path, index=False) 写回。
    【内容查找】在单个文件中查找：with open(path, 'r', encoding='utf-8') as f: content = f.read(); matches = [line for line in content.splitlines() if keyword in line]；正则查找：import re; results = re.findall(pattern, content)；跨目录查找：import os; for root, dirs, files in os.walk('/app/data'): for name in files: if name.endswith('.txt'): fp = os.path.join(root, name); lines = [l for l in open(fp, encoding='utf-8') if keyword in l]; print(fp, lines)；Shell grep：使用 language=shell 并执行 grep -r 'keyword' /app/data/ 进行高效内容搜索。
    支持变量传递（variables 参数）和任何网络访问，适用于数据处理、文件操作、系统脚本、demo 演示、金融数据爬取等场景。当缺少依赖库时，请先用 Python 代码执行 pip install 安装。
  output:
    result: "执行结果（标准输出）"
    stdout: "标准输出内容"
    stderr: "标准错误内容（包含错误信息）"
    success: "执行是否成功"
  params:
    code:
      type: "str"
      required: true
      description: "要执行的代码，支持 Python3 代码或 Shell 脚本。文件读取示例：with open('/app/data/file.txt','r',encoding='utf-8') as f: print(f.read())。文件写入示例：with open('/app/data/out.txt','w',encoding='utf-8') as f: f.write('hello')。文件编辑示例：先 read() 再 replace() 再 write()。内容查找示例：with open(path) as f: print([l for l in f if 'key' in l])。所有输出结果必须使用 print() 打印。"
    language:
      type: "str"
      required: true
      default: "python"
      description: "代码语言类型：python（Python3）或 shell（Shell脚本）。使用 shell 时可利用 grep、sed、awk、find 等命令进行高效的文件查找和内容搜索"
    enable_network:
      type: "bool"
      required: true
      default: true
      description: "是否允许代码访问网络"
    variables:
      type: "dict"
      required: false
      default: {}
      description: "传递给代码的变量字典（仅 Python3 有效），变量会在代码执行前注入为全局变量"

SerperSearchNode:
  type: "serper_search"
  class: "src.nodes.serper_search.SerperSearchNode"
  name: "Serper搜索引擎"
  description: "Serper搜索引擎节点，可以搜索一些时下最新的信息，如新闻、论坛、博客等，如果需要更详细的信息，请自行根据link爬取网页内容"
  output:
    success: "搜索是否成功"
    results: "搜索结果列表，数组类型，每条结果包含字段为：title、link和snippet，如果需要网页正文内容，需要通过link爬取，这里只提供全文概要字段snippet"
    count: "结果数量"
    error: "错误信息(如果有)"
  params:
    query:
      type: "str"
      required: true
      description: "搜索关键词或者短语，需要精确的且明确的词语，不要一次搜索多个关键词"
    country:
      type: "str"
      required: false
      default: "cn"
      description: "搜索国家代码"
    language:
      type: "str"
      required: false
      default: "zh"
      description: "搜索语言代码"
    max_results:
      type: "int"
      required: false
      default: 20
      description: "最大搜索结果数量"

ArxivSearchNode:
  type: "arxiv_search"
  class: "src.nodes.arxiv_search.ArxivSearchNode"
  name: "Arxiv论文搜索"
  description: "搜索Arxiv论文库，返回最相关的5篇论文信息，包括标题、作者、摘要、发布日期、PDF链接等"
  output:
    success: "搜索是否成功"
    results: "论文搜索结果列表，数组类型，每篇论文包含：title(标题)、authors(作者列表)、summary(摘要)、content(正文)、published(发布日期)、pdf_url(PDF下载链接)、entry_id(论文ID)、primary_category(主要分类)"
    count: "返回的论文数量"
    error: "错误信息(如果有)"
  params:
    query:
      type: "str"
      required: true
      description: "搜索关键词，只支持英文关键词，支持Title、Author、Abstract等字段的搜索"

SerperScrapeNode:
  type: "web_crawler"
  class: "src.nodes.serper_scrape.SerperScrapeNode"
  name: "网络爬虫"
  description: "可以根据提供的网页链接爬取网页内容并返回"
  output:
    success: "执行状态"
    error: "错误信息" 
    content: "提取的正文内容"
  params:
    url:
      type: "str"
      required: true
      description: "需要抓取的网页链接"

WeatherForecastNode:
  type: "weather_forecast"
  class: "src.nodes.weather_forecast.WeatherForecastNode"
  name: "天气预报"
  description: "通过经纬度获取天气信息"
  output:
    success: "执行状态"
    error: "错误信息"
    data: "天气数据，包含当前天气、未来3天气和天气总结等信息"
  params:
    latitude:
      type: "float"
      required: false
      description: "纬度，与longitude配合使用"
    longitude:
      type: "float"
      required: false
      description: "经度，与latitude配合使用"

ApiCallNode:
  type: "api_call"
  class: "src.nodes.api_call.ApiCallNode"
  name: "API调用"
  description: "通用API调用节点，支持Bearer Token认证，可用于调用各类REST API接口"
  output:
    status: "HTTP状态码"
    success: "是否调用成功"
    data: "响应数据"
    headers: "响应头"
    error: "错误信息(如果有)"
  params:
    url:
      type: "str"
      required: true
      description: "API接口地址"
    method:
      type: "str"
      required: true
      description: "HTTP请求方法(GET, POST, PUT, DELETE等)"
    headers:
      type: "dict"
      required: false
      default: {}
      description: "请求头，键值对格式"
    body:
      type: "dict"
      required: false
      default: {}
      description: "请求体数据，JSON格式"
    bearer_token:
      type: "str"
      required: false
      description: "Bearer Token认证令牌"

SkillsExtractNode:
  type: "skills_extract"
  class: "src.nodes.skills_extract.SkillsExtractNode"
  name: "技能解析管理"
  description: "从技能目录中加载所有技能的名称和描述（技能列表功能）；根据技能名称获取技能详情，包括技能文件夹结构、skill.md完整内容（不截断）；根据技能名称和文件路径获取技能其他文件内容。"
  output:
    success: "操作是否成功"
    error: "错误信息(如果有)"
    data: "返回的数据，根据操作类型不同而不同"
  params:
    action:
      type: "str"
      required: true
      description: "操作类型：list（列出所有技能）、get（获取技能详情，包括文件夹结构和skill.md完整内容）、getContent（获取技能其他文件内容）"
      example: "list"
    skill_name:
      type: "str"
      required: false
      description: "技能名称（当action为get或getContent时必需）"
      example: "backend-dev-guidelines"
    file_path:
      type: "str"
      required: false
      description: "文件路径（当action为getContent时必需）"
      example: "templates/config.yaml"
    skills_dir:
      type: "str"
      required: false
      default: "/app/.proteus/skills"
      description: "技能目录路径，默认为/app/.proteus/skills"